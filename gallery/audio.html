<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Audio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <link rel="stylesheet" href="../css/header.css"/>
  <link rel="stylesheet" href="../css/media-pages.css"/>
  <link rel="stylesheet" href="../css/footer.css"/>
</head>

<body>

<div id="header"></div>

<main class="media-page">
  <section class="media-wrap">

    <h1 class="media-title">Audio</h1>

    <!-- 🔥 VERTICAL VIDEO LIST -->
    <div class="video-grid">

  <div class="video-box">
    <iframe src="https://www.youtube.com/embed/GFp6crxxqj0" allowfullscreen></iframe>
  </div>

  <div class="video-box">
    <iframe src="https://www.youtube.com/embed/kUb3icGjIbI" allowfullscreen></iframe>
  </div>

  <div class="video-box">
    <iframe src="https://www.youtube.com/embed/S49X2nSJi_c" allowfullscreen></iframe>
  </div>

  <div class="video-box">
    <iframe src="https://www.youtube.com/embed/cl66Ff2rnlM" allowfullscreen></iframe>
  </div>

  <div class="video-box">
    <iframe src="https://www.youtube.com/embed/gkFESmQQTUQ" allowfullscreen></iframe>
  </div>

</div>

  </section>
</main>

<div id="footer"></div>

<!-- 🔥 MODAL -->
<div class="video-modal" id="videoModal">
  <div class="video-player-wrap">
    <button class="video-close" id="videoClose">×</button>
    <video id="modalVideo" controls muted></video>
  </div>
</div>

<!-- IMPORTANT -->
<script src="../js/script.js"></script>
<script src="../js/media-pages.js"></script> <!-- 🔥 MUST -->

</body>
</html>
