<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Devotional Videos</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/media-pages.css" />
    <link rel="stylesheet" href="../css/footer.css" />
  </head>
  <body>
    <div id="header"></div>
    <main class="media-page">
      <section class="media-wrap">
        <h1 class="media-title">Devotional</h1>
        <div class="video-grid">

  <div class="video-box">
    <iframe src="https://www.youtube.com/embed/hNkspM-qQxA"
      allowfullscreen></iframe>
  </div>

  <div class="video-box">
    <iframe src="https://www.youtube.com/embed/V_KZmNW5Lc8"
      allowfullscreen></iframe>
  </div>

  <div class="video-box">
    <iframe src="https://www.youtube.com/embed/D6grBwG0NXg"
      allowfullscreen></iframe>
  </div>

  <div class="video-box">
    <iframe src="https://www.youtube.com/embed/HyA97Wx4oqk"
      allowfullscreen></iframe>
  </div>

  <div class="video-box">
    <iframe src="https://www.youtube.com/embed/GflbuKjv-S0"
      allowfullscreen></iframe>
  </div>

</div>

      </section>
    </main>
    <div id="footer"></div>

    <div class="video-modal" id="videoModal">
      <div class="video-player-wrap">
        <button class="video-close" id="videoClose">×</button>
        <video id="modalVideo" controls></video>
      </div>
    </div>

    <script src="../js/script.js"></script>
    <script src="../js/media-pages.js"></script>
  </body>
</html>
